<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Digital Twin</title>
    <!-- CesiumJS -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <!-- Force Graph (2D Canvas) -->
    <script src="https://unpkg.com/force-graph"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 3D Map Container -->
    <div id="cesiumContainer"></div>

    <!-- UI Overlay: Glassmorphism Header -->
    <header class="glass-header">
        <h1>Heritage Digital Twin </h1>
        <p>국가유산 공간 지식 네트워크</p>
    </header>

    <!-- UI Overlay: Graph DB Panel -->
    <aside id="graphPanel" class="glass-panel hidden">
        <div class="panel-header">
            <h2 id="selectedName">유산명</h2>
            <button id="closePanelBtn" class="close-btn">&times;</button>
        </div>
        <div class="panel-info">
            <p><span class="label">시대</span> <span id="selectedEra" class="value">-</span></p>
            <p><span class="label">종목</span> <span id="selectedCategory" class="value">-</span></p>
            <p><span class="label">위치</span> <span id="selectedLocation" class="value">-</span></p>
        </div>
        <div class="graph-container-wrapper">
            <h3 class="section-title">지식 네트워크 (Knowledge Graph)</h3>
            <div id="graphContainer"></div>
        </div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
